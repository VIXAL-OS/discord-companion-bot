# discord-companion-bot turnkey deploy.
#
#   docker compose up -d --build     # first run (and after `git pull`)
#   docker compose logs -f           # watch it connect
#   docker compose down              # stop
#
# Requires a .env (DISCORD_TOKEN + ANTHROPIC_API_KEY; see .env.example) and a
# config.json (see config.json.example) in this directory.
#
# NOTE: proactive support (monitored_users) defaults EMPTY — this fork only
# watches users you explicitly opt in via config. See the README.
services:
  bot:
    build: .
    container_name: discord-companion-bot
    restart: unless-stopped
    env_file: .env            # DISCORD_TOKEN, ANTHROPIC_API_KEY, (optional) DEEPSEEK_API_KEY
    volumes:
      # Secrets + persistent state on the HOST, not the image.
      - ./config.json:/app/config.json:ro    # channel IDs + tokens (gitignored)
      - ./memories:/app/memories              # two-tier memory store (gitignored)
      - ./data:/app/data                      # misc runtime state (auto-created if unused)
      - ./logs:/app/logs                      # logs
      # Whisper model cache — downloads once on first 🎙️, persists across rebuilds.
      - whisper-cache:/root/.cache/whisper

volumes:
  whisper-cache:
